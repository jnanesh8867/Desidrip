<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>DesiDrip — Shop The Reel 🔥</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#07070A;color:#F0F0F5;font-family:Poppins,sans-serif;overflow:hidden;height:100vh;width:100vw;}
#root{height:100vh;width:100vw;}
::-webkit-scrollbar{display:none;}
input,select,button{font-family:Poppins,sans-serif;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">

const { useState, useEffect } = React;

const OR="#FF6B00",PK="#FF3CAC",GN="#00E676",GD="#FFD700";
const BG="#07070A",C2="#1A1A20",TX="#F0F0F5",MT="#666";

// LocalStorage DB
const DB={
  get:(k)=>{try{return JSON.parse(localStorage.getItem("dd_"+k)||"[]");}catch{return[];}},
  set:(k,v)=>{try{localStorage.setItem("dd_"+k,JSON.stringify(v));}catch{}},
  add:(k,i)=>{const a=DB.get(k);a.push(i);DB.set(k,a);},
  getUser:()=>{try{return JSON.parse(localStorage.getItem("dd_cu")||"null");}catch{return null;}},
  setUser:(u)=>{try{localStorage.setItem("dd_cu",JSON.stringify(u));}catch{}},
  clearUser:()=>localStorage.removeItem("dd_cu"),
};

const PRODUCTS=[
  {id:1,name:"Chanderi Silk Kurta",emoji:"👗",price:1299,old:2499,off:"48%",bg:"linear-gradient(135deg,#1a0a2e,#4a1a6e)",artisan:true,seller:"@riya",rating:"⭐⭐⭐⭐⭐"},
  {id:2,name:"Kolhapuri Sneakers",emoji:"👟",price:799,old:1499,off:"47%",bg:"linear-gradient(135deg,#1a0000,#5c1a1a)",artisan:false,seller:"@sole",rating:"⭐⭐⭐⭐⭐"},
  {id:3,name:"Kundan Necklace",emoji:"💍",price:549,old:999,off:"45%",bg:"linear-gradient(135deg,#1a1200,#5c4200)",artisan:true,seller:"@jaipur",rating:"⭐⭐⭐⭐⭐"},
  {id:4,name:"Banarasi Saree",emoji:"🥻",price:2199,old:4500,off:"51%",bg:"linear-gradient(135deg,#0a001a,#3a0060)",artisan:true,seller:"@meera",rating:"⭐⭐⭐⭐⭐"},
  {id:5,name:"Mysore Pak",emoji:"🍬",price:299,old:499,off:"40%",bg:"linear-gradient(135deg,#1a1000,#5c3800)",artisan:true,seller:"@krishna",rating:"⭐⭐⭐⭐⭐"},
  {id:6,name:"Warli Cushion Set",emoji:"🎨",price:899,old:1800,off:"50%",bg:"linear-gradient(135deg,#001a0d,#004a20)",artisan:false,seller:"@tribal",rating:"⭐⭐⭐⭐"},
];

const REELS=[
  {id:1,user:"@riya_boutique",av:"R",avBg:OR,badge:"👑 VIP",live:true,desc:"✨ Chanderi Silk! Handwoven artisans 🔥 Ships worldwide!",prod:PRODUCTS[0],likes:"24K",bg:"linear-gradient(145deg,#1a0a2e,#4a1a6e)"},
  {id:2,user:"@jaipur_gems",av:"J",avBg:GD,badge:"🥇 Gold",live:false,desc:"Kundan Necklace — ODOP Rajasthan 💎 NRI welcome!",prod:PRODUCTS[2],likes:"32K",bg:"linear-gradient(145deg,#001a0d,#004a20)"},
  {id:3,user:"@krishna_sweets",av:"K",avBg:"#FF5722",badge:"🏅 GI Tag",live:false,desc:"Authentic Mysore Pak! 100-year-old recipe 🍬",prod:PRODUCTS[4],likes:"45K",bg:"linear-gradient(145deg,#1a0500,#5a1500)"},
  {id:4,user:"@meera_silks",av:"M",avBg:"#9C27B0",badge:"🥈 Silver",live:true,desc:"Banarasi Silk — handwoven 20 days 🥻 Wedding season!",prod:PRODUCTS[3],likes:"18K",bg:"linear-gradient(145deg,#0a001a,#3a0060)"},
];

const btn=(extra={})=>({padding:"14px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${OR},${PK})`,color:"white",fontSize:14,fontWeight:700,cursor:"pointer",width:"100%",...extra});
const inp={background:C2,border:"1.5px solid rgba(255,255,255,0.07)",borderRadius:11,padding:"12px 14px",color:TX,fontSize:13,width:"100%",outline:"none"};

function Toast({msg,type}){
  if(!msg)return null;
  return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:type==="er"?"#DC2626":type==="info"?"#2563EB":"#059669",color:"white",padding:"10px 20px",borderRadius:22,fontSize:13,fontWeight:700,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{msg}</div>;
}

function Modal({open,onClose,title,children}){
  if(!open)return null;
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:200,display:"flex",alignItems:"flex-end"}}>
    <div style={{background:"#111115",borderRadius:"22px 22px 0 0",width:"100%",padding:"20px 16px 36px",maxHeight:"92vh",overflowY:"auto"}}>
      <div style={{width:36,height:4,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 16px"}}/>
      {title&&<div style={{fontSize:16,fontWeight:700,marginBottom:14}}>{title}</div>}
      {children}
    </div>
  </div>;
}

function DesiDrip(){
  const [scr,setScr]=useState("splash");
  const [tab,setTab]=useState("home");
  const [user,setUser]=useState(null);
  const [authMode,setAuthMode]=useState("login");
  const [toast,setToast]=useState({msg:"",type:"ok"});
  const [modal,setModal]=useState(null);
  const [cart,setCart]=useState([]);
  const [orders,setOrders]=useState([]);
  const [products,setProducts]=useState([]);
  const [coins,setCoins]=useState(500);
  const [role,setRole]=useState("buyer");
  const [selProd,setSelProd]=useState(null);
  const [likes,setLikes]=useState({});
  const [follows,setFollows]=useState({});
  const [notifs,setNotifs]=useState([
    {id:1,ic:"📦",title:"Welcome to DesiDrip! 🎉",body:"You have 500 DesiCoins! Upload a reel to earn more.",time:"Just now",read:false},
    {id:2,ic:"🎬",title:"Reel Tips",body:"Upload a product reel and earn +500 DesiCoins instantly!",time:"1 hour ago",read:false},
    {id:3,ic:"💰",title:"Flash Sale Starting!",body:"70% off on selected products. Hurry before it ends!",time:"2 hours ago",read:true},
  ]);
  const [flash,setFlash]=useState(2*3600+45*60+30);
  const [splash,setSplash]=useState(0);
  const [loginF,setLoginF]=useState({email:"",pass:""});
  const [signupF,setSignupF]=useState({name:"",email:"",pass:""});
  const [orderF,setOrderF]=useState({addr1:"",addr2:""});
  const [sellerF,setSellerF]=useState({name:"",price:"",cat:""});
  const [upStep,setUpStep]=useState(0);
  const [upPct,setUpPct]=useState(0);
  const [activeCat,setActiveCat]=useState(0);
  const [activeReel,setActiveReel]=useState(0);
  const [chatMsg,setChatMsg]=useState("");
  const [chatHistory,setChatHistory]=useState([
    {from:"seller",msg:"Hello! I handcraft these products 🙏"},
    {from:"seller",msg:"How can I help you today?"},
  ]);
  const [b2bForm,setB2bForm]=useState({company:"",name:"",phone:"",type:""});

  const toast2=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast({msg:"",type:"ok"}),2500);};
  const pad=n=>String(n).padStart(2,"0");
  const flH=Math.floor(flash/3600),flM=Math.floor((flash%3600)/60),flS=flash%60;
  const unread=notifs.filter(n=>!n.read).length;

  useEffect(()=>{
    const iv=setInterval(()=>{
      setSplash(p=>{
        if(p>=100){clearInterval(iv);
          const cu=DB.getUser();
          if(cu){setUser(cu);setCoins(cu.coins||500);setOrders(DB.get("orders").filter(o=>o.uid===cu.uid));setProducts(DB.get("products").filter(p=>p.sellerId===cu.uid));setScr("app");}
          else setScr("role");
          return 100;}
        return p+4;
      });
    },50);
    return()=>clearInterval(iv);
  },[]);

  useEffect(()=>{
    const iv=setInterval(()=>setFlash(t=>Math.max(0,t-1)),1000);
    return()=>clearInterval(iv);
  },[]);

  const doLogin=()=>{
    const{email,pass}=loginF;
    if(!email||!pass){toast2("❌ Enter email & password!","er");return;}
    const users=DB.get("users");
    const u=users.find(u=>u.email===email&&u.password===pass);
    if(!u){toast2("❌ Wrong! Sign up first.","er");return;}
    setUser(u);DB.setUser(u);setCoins(u.coins||500);
    setOrders(DB.get("orders").filter(o=>o.uid===u.uid));
    setProducts(DB.get("products").filter(p=>p.sellerId===u.uid));
    setScr("app");toast2("🎉 Welcome back "+u.name+"!");
  };

  const doSignup=()=>{
    const{name,email,pass}=signupF;
    if(!name||!email||!pass){toast2("❌ Fill all fields!","er");return;}
    if(pass.length<6){toast2("❌ Password min 6 chars!","er");return;}
    const users=DB.get("users");
    if(users.find(u=>u.email===email)){toast2("❌ Email exists! Login instead.","er");return;}
    const uid="u_"+Date.now();
    const u={uid,name,email,password:pass,role,coins:500};
    users.push(u);DB.set("users",users);
    setUser(u);DB.setUser(u);setCoins(500);
    setScr("app");toast2("🎉 Welcome to DesiDrip! +500 DesiCoins!");
  };

  const doLogout=()=>{
    setUser(null);DB.clearUser();
    setScr("role");setTab("home");toast2("👋 Logged out!");
  };

  const doOrder=()=>{
    if(!orderF.addr1||!orderF.addr2){toast2("❌ Enter delivery address!","er");return;}
    const oid="DD-"+Date.now();
    const o={orderId:oid,uid:user?.uid,product:selProd.name,emoji:selProd.emoji,price:selProd.price,address:orderF.addr1+", "+orderF.addr2,status:"placed"};
    DB.add("orders",o);
    setOrders(prev=>[...prev,o]);setCoins(c=>c+100);
    setCart(prev=>[...prev,selProd]);
    setNotifs(prev=>[{id:Date.now(),ic:"📦",title:"✅ Order Placed!",body:"Your "+selProd.name+" order #"+oid.slice(-6)+" is confirmed! +100 DesiCoins",time:"Just now",read:false},...prev]);
    setModal(null);setSelProd(null);setOrderF({addr1:"",addr2:""});
    toast2("✅ Order Placed! +100 DesiCoins 🎉");
  };

  const doAddProd=()=>{
    if(!sellerF.name||!sellerF.price||!sellerF.cat){toast2("❌ Fill all fields!","er");return;}
    const p={id:"p_"+Date.now(),name:sellerF.name,price:parseInt(sellerF.price),category:sellerF.cat,sellerId:user?.uid,emoji:"📦",status:"active"};
    DB.add("products",p);setProducts(prev=>[...prev,p]);setSellerF({name:"",price:"",cat:""});
    toast2("✅ Product listed worldwide!");
  };

  const doUpload=()=>{
    setUpPct(0);
    const iv=setInterval(()=>{
      setUpPct(p=>{
        if(p>=100){clearInterval(iv);setUpStep(1);setCoins(c=>c+500);
          setNotifs(prev=>[{id:Date.now(),ic:"🎬",title:"🎬 Reel is Live!",body:"Your reel is now live! +500 DesiCoins earned!",time:"Just now",read:false},...prev]);
          return 100;}
        return p+5;
      });
    },100);
  };

  const sendChat=()=>{
    if(!chatMsg.trim())return;
    setChatHistory(prev=>[...prev,{from:"me",msg:chatMsg}]);
    const m=chatMsg;setChatMsg("");
    setTimeout(()=>{
      const replies=["Thank you! We can arrange bulk 🙏","Sure! Custom orders welcome 😊","Minimum 10 pieces per design","We ship worldwide! 🌍"];
      setChatHistory(prev=>[...prev,{from:"seller",msg:replies[Math.floor(Math.random()*replies.length)]}]);
    },1200);
  };

  const doB2B=()=>{
    if(!b2bForm.company||!b2bForm.name||!b2bForm.phone||!b2bForm.type){toast2("❌ Fill required fields!","er");return;}
    DB.add("b2b_requests",{...b2bForm,createdAt:new Date().toISOString()});
    setB2bForm({company:"",name:"",phone:"",type:""});
    setModal(null);toast2("✅ B2B Request Sent! We'll contact you within 24hrs!");
  };

  const nm=user?.name||"User";

  // SPLASH
  if(scr==="splash") return <>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse at center,#1a0800,#07070A)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{fontSize:68,fontWeight:900,letterSpacing:8,background:`linear-gradient(135deg,${OR},${PK},${GD})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DesiDrip</div>
      <div style={{display:"flex",gap:10,fontSize:22}}>🇮🇳 🌍 🎬 🛍️ 💫</div>
      <div style={{color:MT,fontSize:11,letterSpacing:4}}>WORLD'S FIRST DESI VIDEO COMMERCE</div>
      <div style={{width:80,height:3,background:"rgba(255,255,255,0.1)",borderRadius:2,overflow:"hidden"}}>
        <div style={{height:"100%",width:splash+"%",background:`linear-gradient(90deg,${OR},${PK})`,borderRadius:2,transition:"width 0.05s"}}/>
      </div>
    </div>
    <Toast {...toast}/>
  </>;

  // ROLE
  if(scr==="role") return <>
    <div style={{position:"fixed",inset:0,background:`linear-gradient(160deg,${BG},#120800)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:24,overflowY:"auto"}}>
      <div style={{fontSize:40,fontWeight:900,letterSpacing:5,background:`linear-gradient(135deg,${OR},${PK})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DesiDrip</div>
      <div style={{color:MT,fontSize:10,letterSpacing:2}}>WORLD'S FIRST DESI VIDEO COMMERCE</div>
      <div style={{fontSize:16,fontWeight:700}}>Who are you?</div>
      {[{r:"buyer",ic:"🛍️",nm:"Buyer",ds:"Watch Reels & Order Instantly. Earn DesiCoins!",bdg:"🌍 Shop 50+ Countries",bg:"rgba(255,107,0,0.1)",bc:"rgba(255,107,0,0.25)"},
        {r:"seller",ic:"🎬",nm:"Seller / Artisan",ds:"Create Reels, Sell Products & Become a VIP Creator!",bdg:"✅ Verified Artisan Program",bg:"rgba(0,230,118,0.08)",bc:"rgba(0,230,118,0.25)"}].map(({r,ic,nm,ds,bdg,bg,bc})=>
        <div key={r} onClick={()=>{setRole(r);setScr("lang");}} style={{width:"100%",maxWidth:340,background:bg,border:`2px solid ${bc}`,borderRadius:18,padding:"20px 16px",cursor:"pointer"}}>
          <div style={{fontSize:36,marginBottom:8}}>{ic}</div>
          <div style={{fontSize:19,fontWeight:800,marginBottom:4}}>{nm}</div>
          <div style={{fontSize:11,color:MT,lineHeight:1.5,marginBottom:8}}>{ds}</div>
          <span style={{background:"rgba(255,107,0,0.15)",color:OR,fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20,border:"1px solid rgba(255,107,0,0.3)"}}>{bdg}</span>
        </div>
      )}
    </div>
    <Toast {...toast}/>
  </>;

  // LANG
  if(scr==="lang") return <>
    <div style={{position:"fixed",inset:0,background:`linear-gradient(160deg,${BG},#08060E)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:20,overflowY:"auto"}}>
      <div style={{fontSize:38,fontWeight:900,letterSpacing:5,background:`linear-gradient(135deg,${OR},${PK})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DesiDrip</div>
      <div style={{color:MT,fontSize:10,letterSpacing:2}}>CHOOSE LANGUAGE</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,width:"100%",maxWidth:340}}>
        {[["English","English"],["Kannada","ಕನ್ನಡ"],["Hindi","हिन्दी"],["Tamil","தமிழ்"],["Telugu","తెలుగు"],["Malayalam","മലയാളം"],["Marathi","मराठी"],["Bengali","বাংলা"],["Gujarati","ગુજરાતી"],["Punjabi","ਪੰਜਾਬੀ"]].map(([en,native])=>
          <div key={en} onClick={()=>setScr("auth")} style={{padding:"12px 8px",borderRadius:12,border:"1.5px solid rgba(255,255,255,0.06)",background:C2,cursor:"pointer",textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:700,marginBottom:2}}>{native}</div>
            <div style={{fontSize:9,color:MT}}>{en}</div>
          </div>
        )}
      </div>
      <button style={btn({maxWidth:340})} onClick={()=>setScr("auth")}>Continue →</button>
    </div>
    <Toast {...toast}/>
  </>;

  // AUTH
  if(scr==="auth") return <>
    <div style={{position:"fixed",inset:0,background:`linear-gradient(160deg,${BG},#080510)`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:11,padding:24,overflowY:"auto"}}>
      <div style={{fontSize:36,fontWeight:900,letterSpacing:4,background:`linear-gradient(135deg,${OR},${PK})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DesiDrip</div>
      <div style={{color:MT,fontSize:11}}>India's #1 Video Commerce 🌍</div>
      <div style={{display:"flex",background:C2,borderRadius:10,padding:3,width:"100%"}}>
        {["login","signup"].map(m=>
          <div key={m} onClick={()=>setAuthMode(m)} style={{flex:1,padding:"9px",textAlign:"center",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",background:authMode===m?OR:"transparent",color:authMode===m?"white":MT}}>
            {m==="login"?"Login":"Sign Up"}
          </div>
        )}
      </div>
      {authMode==="login"?
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <input style={inp} placeholder="📧 Email" type="email" value={loginF.email} onChange={e=>setLoginF({...loginF,email:e.target.value})}/>
          <input style={inp} placeholder="🔒 Password" type="password" value={loginF.pass} onChange={e=>setLoginF({...loginF,pass:e.target.value})}/>
          <button style={btn()} onClick={doLogin}>Login →</button>
          <div style={{textAlign:"center",color:MT,fontSize:11}}>— or —</div>
          <button onClick={()=>{const u={uid:"g_"+Date.now(),name:"Google User",email:"google@gmail.com",role,coins:500};setUser(u);DB.setUser(u);setScr("app");toast2("🎉 Google Login!");}} style={{padding:12,borderRadius:11,border:"1.5px solid rgba(255,255,255,0.1)",background:C2,color:TX,fontSize:13,fontWeight:600,cursor:"pointer",width:"100%"}}>🔵 Continue with Google</button>
        </div>:
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:10}}>
          <input style={inp} placeholder="👤 Full Name" value={signupF.name} onChange={e=>setSignupF({...signupF,name:e.target.value})}/>
          <input style={inp} placeholder="📧 Email" type="email" value={signupF.email} onChange={e=>setSignupF({...signupF,email:e.target.value})}/>
          <input style={inp} placeholder="🔒 Password (min 6)" type="password" value={signupF.pass} onChange={e=>setSignupF({...signupF,pass:e.target.value})}/>
          <button style={btn()} onClick={doSignup}>Create Account →</button>
          <div style={{fontSize:10,color:MT,textAlign:"center"}}>By signing up you agree to our Terms & Privacy Policy</div>
        </div>
      }
    </div>
    <Toast {...toast}/>
  </>;

  // MAIN APP
  return <>
    <div style={{position:"fixed",inset:0,background:BG,color:TX,display:"flex",flexDirection:"column",overflow:"hidden"}}>
      {/* NAV */}
      <div style={{flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"rgba(7,7,10,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,107,0,0.07)"}}>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:3,background:`linear-gradient(135deg,${OR},${PK})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DesiDrip</div>
        <div style={{display:"flex",gap:12,alignItems:"center",fontSize:19}}>
          <span style={{cursor:"pointer"}} onClick={()=>setModal("voice")}>🎤</span>
          <span style={{cursor:"pointer",position:"relative"}} onClick={()=>setModal("notifs")}>
            🔔
            {unread>0&&<span style={{position:"absolute",top:-5,right:-5,background:"#FF1744",color:"white",fontSize:7,fontWeight:700,width:13,height:13,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{unread}</span>}
          </span>
          <span style={{cursor:"pointer",position:"relative"}} onClick={()=>setModal("wallet")}>
            🪙
            <span style={{position:"absolute",top:-5,right:-5,background:GD,color:"#000",fontSize:7,fontWeight:700,width:13,height:13,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{coins>99?"99+":coins}</span>
          </span>
          <span style={{cursor:"pointer",position:"relative"}} onClick={()=>setTab("cart")}>
            🛒
            {cart.length>0&&<span style={{position:"absolute",top:-5,right:-5,background:OR,color:"white",fontSize:7,fontWeight:700,width:13,height:13,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{cart.length}</span>}
          </span>
        </div>
      </div>

      {/* CONTENT */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:68}}>

        {/* HOME */}
        {tab==="home"&&<div>
          <div style={{padding:"10px 12px"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,background:C2,borderRadius:12,padding:"10px 13px",border:"1px solid rgba(255,255,255,0.05)"}}>
              <span>🔍</span>
              <input style={{flex:1,background:"none",border:"none",outline:"none",color:TX,fontSize:13}} placeholder="Search products, artisans..."/>
              <span style={{cursor:"pointer"}} onClick={()=>setModal("voice")}>🎤</span>
            </div>
          </div>

            <button onClick={doLogout} style={{width:"100%",padding:12,borderRadius:11,border:"1px solid rgba(255,107,0,0.3)",background:"transparent",color:OR,fontSize:13,fontWeight:700,cursor:"pointer"}}>Logout</button>
          </div>
        </div>}

        {/* SELLER */}
        {tab==="seller"&&<div>
          <div style={{position:"sticky",top:0,background:BG,padding:"11px 12px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:20,cursor:"pointer"}} onClick={()=>setTab("profile")}>←</span>
            <span style={{fontSize:15,fontWeight:700}}>🏪 Seller Dashboard</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,padding:12}}>
            {[["₹"+(orders.reduce((s,o)=>s+o.price,0)*0.1).toFixed(0),"Earnings",GN],[orders.length,"Sales",OR],[products.length,"Products",GD],["4.9⭐","Rating","#2563EB"]].map(([n,l,col])=>
              <div key={l} style={{background:C2,borderRadius:11,padding:12}}>
                <div style={{fontSize:20,fontWeight:800,color:col}}>{n}</div>
                <div style={{fontSize:9,color:MT,marginTop:2}}>{l}</div>
              </div>
            )}
          </div>
          <div style={{padding:"0 12px 14px"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>➕ Add New Product</div>
            <div style={{display:"flex",flexDirection:"column",gap:9}}>
              <input style={inp} placeholder="📦 Product Name" value={sellerF.name} onChange={e=>setSellerF({...sellerF,name:e.target.value})}/>
              <input style={inp} placeholder="💰 Price (₹)" type="number" value={sellerF.price} onChange={e=>setSellerF({...sellerF,price:e.target.value})}/>
              <select style={inp} value={sellerF.cat} onChange={e=>setSellerF({...sellerF,cat:e.target.value})}>
                <option value="">🏷️ Category</option>
                {["Fashion","Jewellery","Sarees","Home Decor","Beauty","Food","Handicrafts","Electronics"].map(c=><option key={c}>{c}</option>)}
              </select>
              <button style={btn({background:"linear-gradient(135deg,#059669,#00BCD4)",color:"#000"})} onClick={doAddProd}>✅ List Product & Go Live</button>
            </div>
          </div>
          <div style={{padding:"0 12px"}}>
            <div style={{fontSize:13,fontWeight:700,marginBottom:9}}>📋 My Products</div>
            {products.length===0
              ?<div style={{textAlign:"center",color:MT,padding:16,fontSize:12}}>No products yet!</div>
              :products.map((p,i)=>
                <div key={i} style={{background:C2,borderRadius:10,padding:12,marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:26}}>📦</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:700}}>{p.name}</div>
                    <div style={{fontSize:11,color:GN}}>₹{p.price}</div>
                    <div style={{fontSize:9,color:MT}}>{p.category}</div>
                  </div>
                  <span style={{background:"rgba(0,230,118,0.15)",color:GN,padding:"3px 8px",borderRadius:6,fontSize:9,fontWeight:700}}>LIVE ✅</span>
                </div>
              )
            }
          </div>
        </div>}

        {/* TRACK */}
        {tab==="track"&&<div style={{padding:"14px 12px 80px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:18}}>
            <span style={{fontSize:20,cursor:"pointer"}} onClick={()=>setTab("profile")}>←</span>
            <div>
              <div style={{fontSize:15,fontWeight:700}}>📦 Track Orders</div>
              <div style={{fontSize:10,color:MT}}>Your recent orders</div>
            </div>
          </div>
          {orders.length===0
            ?<div style={{textAlign:"center",color:MT,padding:36,fontSize:13}}>No orders yet!<br/>Shop from Reels 🎬</div>
            :orders.map((o,i)=>
              <div key={i} style={{background:C2,borderRadius:14,padding:14,marginBottom:10,border:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700}}>#{(o.orderId||"").slice(-8)}</span>
                  <span style={{background:"rgba(0,230,118,0.15)",color:GN,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>Placed ✅</span>
                </div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{o.product}</div>
                <div style={{fontSize:12,color:GN,fontWeight:700,marginBottom:4}}>₹{o.price}</div>
                <div style={{fontSize:11,color:MT}}>{o.address}</div>
                <div style={{marginTop:10,height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:"35%",background:`linear-gradient(90deg,${OR},${PK})`,borderRadius:2}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                  <span style={{fontSize:9,color:OR}}>Packed</span>
                  <span style={{fontSize:9,color:MT}}>Shipped</span>
                  <span style={{fontSize:9,color:MT}}>Delivered</span>
                </div>
              </div>
            )
          }
        </div>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{flexShrink:0,display:"flex",justifyContent:"space-around",padding:"9px 0 16px",background:"rgba(7,7,10,0.98)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
        {[["🏠","Home","home"],["🎬","Reels","reels"],["➕","Upload","upload"],["🪙","Rewards","rewards"],["👤","Profile","profile"]].map(([ic,lb,t])=>
          <div key={t} onClick={()=>{if(t==="upload"){setModal("upload");setUpStep(0);setUpPct(0);}else setTab(t);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
            <span style={{fontSize:20}}>{ic}</span>
            <span style={{fontSize:9,color:tab===t?OR:MT,fontWeight:600}}>{lb}</span>
            {tab===t&&<div style={{width:4,height:4,background:OR,borderRadius:"50%",marginTop:2}}/>}
          </div>
        )}
      </div>

      {/* FAB */}
      <button onClick={()=>{setModal("upload");setUpStep(0);setUpPct(0);}} style={{position:"fixed",bottom:74,right:14,width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,border:"none",fontSize:20,cursor:"pointer",boxShadow:"0 4px 18px rgba(255,107,0,0.6)",zIndex:40}}>🎬</button>

      {/* MODALS */}
      <Modal open={modal==="order"&&!!selProd} onClose={()=>setModal(null)} title="🛒 Order Now">
        {selProd&&<div>
          <div style={{display:"flex",alignItems:"center",gap:11,background:C2,borderRadius:11,padding:11,marginBottom:16}}>
            <span style={{fontSize:44}}>{selProd.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700}}>{selProd.name}</div>
              <div style={{fontSize:17,fontWeight:800,color:GN}}>₹{selProd.price}</div>
              <div style={{fontSize:10,color:MT,textDecoration:"line-through"}}>₹{selProd.old}</div>
            </div>
            <button onClick={()=>toast2("🔮 AR Try-On!")} style={{background:"rgba(255,107,0,0.12)",border:"1px solid rgba(255,107,0,0.3)",color:OR,padding:"6px 10px",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer"}}>🔮 AR Try</button>
          </div>
          <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Delivery Address</div>
          <input style={{...inp,marginBottom:8}} placeholder="📍 House/Flat No, Street" value={orderF.addr1} onChange={e=>setOrderF({...orderF,addr1:e.target.value})}/>
          <input style={{...inp,marginBottom:14}} placeholder="🏙️ City, State, PIN" value={orderF.addr2} onChange={e=>setOrderF({...orderF,addr2:e.target.value})}/>
          <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Payment</div>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:16}}>
            {[["💳","UPI / GPay / PhonePe","Instant & Secure"],["🏦","Net Banking / Card","All banks"],["💵","Cash on Delivery","Pay when delivered"],["🌍","International Card","For NRI & Global"]].map(([ic,nm,sb])=>
              <div key={nm} style={{display:"flex",alignItems:"center",gap:10,background:C2,borderRadius:10,padding:11,border:"1.5px solid rgba(255,255,255,0.05)",cursor:"pointer"}}>
                <span style={{fontSize:20}}>{ic}</span>
                <div>
                  <div style={{fontSize:12,fontWeight:600}}>{nm}</div>
                  <div style={{fontSize:9,color:MT}}>{sb}</div>
                </div>
              </div>
            )}
          </div>
          <button style={btn()} onClick={doOrder}>✅ Place Order — ₹{selProd?.price}</button>
          <div style={{textAlign:"center",fontSize:10,color:MT,marginTop:9}}>🔒 Secure • LocalStorage Protected</div>
        </div>}
      </Modal>

      <Modal open={modal==="wallet"} onClose={()=>setModal(null)} title="🪙 DesiCoins Wallet">
        <div style={{background:"linear-gradient(135deg,rgba(255,107,0,0.12),rgba(255,60,172,0.12))",borderRadius:13,padding:16,textAlign:"center",border:"1px solid rgba(255,107,0,0.18)",marginBottom:14}}>
          <div style={{fontSize:42,fontWeight:800,background:"linear-gradient(135deg,#D97706,#cc7000)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🪙 {coins}</div>
          <div style={{fontSize:11,color:MT}}>DesiCoins Balance</div>
          <div style={{fontSize:10,color:MT,marginTop:2}}>No cash-out • Use for discounts & boosts</div>
        </div>
        <div style={{display:"flex",gap:7,marginBottom:14}}>
          {[["💸 Discount",`linear-gradient(135deg,${OR},${PK})`,"white"],["🚀 Boost","linear-gradient(135deg,#2563EB,#7C3AED)","white"],["❤️ Donate","linear-gradient(135deg,#059669,#00BCD4)","#000"]].map(([lb,bg,col])=>
            <button key={lb} onClick={()=>toast2(lb+" applied!")} style={{flex:1,padding:10,borderRadius:10,fontSize:11,fontWeight:700,cursor:"pointer",border:"none",background:bg,color:col}}>{lb}</button>
          )}
        </div>
        <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>Recent Transactions</div>
        {[["🎬","Reel Uploaded","Today","+500",GN],["🛍️","Order Placed","Yesterday","+100",GN],["💸","Discount Used","Last week","-200","#ff5252"]].map(([ic,nm,dt,am,col])=>
          <div key={nm} style={{display:"flex",alignItems:"center",gap:9,background:C2,borderRadius:9,padding:10,marginBottom:6}}>
            <span style={{fontSize:20}}>{ic}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:600}}>{nm}</div>
              <div style={{fontSize:9,color:MT}}>{dt}</div>
            </div>
            <span style={{fontSize:12,fontWeight:700,color:col}}>{am}</span>
          </div>
        )}
        <button style={{...btn(),marginTop:10,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:MT,fontSize:12}} onClick={()=>setModal(null)}>Close</button>
      </Modal>

      <Modal open={modal==="notifs"} onClose={()=>setModal(null)} title="🔔 Notifications">
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {notifs.map((n,i)=>
            <div key={n.id} onClick={()=>{setNotifs(prev=>prev.map((x,j)=>j===i?{...x,read:true}:x));}} style={{display:"flex",alignItems:"flex-start",gap:11,padding:12,background:n.read?"rgba(255,255,255,0.02)":"rgba(255,107,0,0.08)",borderRadius:12,border:n.read?"1px solid rgba(255,255,255,0.04)":"1px solid rgba(255,107,0,0.2)",cursor:"pointer"}}>
              <span style={{fontSize:24,flexShrink:0}}>{n.ic}</span>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{n.title}</div>
                <div style={{fontSize:11,color:MT,lineHeight:1.4}}>{n.body}</div>
                <div style={{fontSize:9,color:MT,marginTop:4}}>{n.time}</div>
              </div>
              {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:OR,flexShrink:0,marginTop:4}}/>}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={()=>{setNotifs(prev=>prev.map(n=>({...n,read:true})));toast2("✅ All read!");}} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"rgba(255,107,0,0.15)",color:OR,fontSize:12,fontWeight:700,cursor:"pointer"}}>✅ Mark All Read</button>
          <button onClick={()=>setModal(null)} style={{flex:1,padding:10,borderRadius:10,border:"none",background:C2,color:TX,fontSize:12,fontWeight:700,cursor:"pointer"}}>Close</button>
        </div>
      </Modal>

      <Modal open={modal==="upload"} onClose={()=>setModal(null)} title="🎬 Upload Reel & Earn">
        {upStep===0
          ?<div>
            <div onClick={()=>toast2("📱 Camera opening...")} style={{border:"2px dashed rgba(255,107,0,0.35)",borderRadius:14,padding:28,textAlign:"center",cursor:"pointer",background:"rgba(255,107,0,0.04)",marginBottom:12}}>
              <div style={{fontSize:44,marginBottom:8}}>🎬</div>
              <div style={{fontSize:13,color:MT}}>Tap to record or upload</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:4}}>Max 3 min • MP4/MOV</div>
            </div>
            <input style={{...inp,marginBottom:9}} placeholder="✍️ Caption... #hashtags"/>
            <input style={{...inp,marginBottom:9}} placeholder="🏷️ Tag product"/>
            <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7}}>Video Filters</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:12}}>
              {[["🎨","Original",C2],["🌅","Warm","linear-gradient(135deg,#ff9a00,#ff6200)"],["💜","Cool","linear-gradient(135deg,#667eea,#764ba2)"],["🌿","Fresh","linear-gradient(135deg,#11998e,#38ef7d)"],["✨","Golden","linear-gradient(135deg,#f7971e,#ffd200)"],["💗","Pink","linear-gradient(135deg,#f953c6,#b91d73)"]].map(([ic,nm,bg])=>
                <div key={nm} onClick={()=>toast2("✨ "+nm+" applied!")} style={{flexShrink:0,width:56,height:56,borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"2px solid rgba(255,255,255,0.07)",background:bg}}>
                  <span style={{fontSize:18}}>{ic}</span>
                  <span style={{fontSize:8,color:"rgba(255,255,255,0.6)",marginTop:2}}>{nm}</span>
                </div>
              )}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7}}>Add Music 🎵</div>
            <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:12}}>
              {["🎵 Trending","🥁 Bollywood","🎸 Folk","🎹 Classical","🎤 Hip-Hop"].map(m=>
                <div key={m} onClick={()=>toast2("🎵 "+m+" added!")} style={{flexShrink:0,background:C2,borderRadius:9,padding:"7px 11px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",border:"1.5px solid rgba(255,255,255,0.05)"}}>{m}</div>
              )}
            </div>
            {upPct>0&&upPct<100&&<div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:MT,marginBottom:6}}>AI Processing... {upPct}%</div>
              <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:upPct+"%",background:`linear-gradient(90deg,${OR},${PK})`,borderRadius:2,transition:"width 0.1s"}}/>
              </div>
            </div>}
            <button style={btn()} onClick={doUpload}>🚀 Upload & Earn 500 DesiCoins!</button>
          </div>
          :<div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{width:90,height:90,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,margin:"0 auto 16px"}}>🔥</div>
            <div style={{fontSize:36,fontWeight:900,letterSpacing:3,background:`linear-gradient(135deg,${OR},${PK},${GD})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DRIP IS LIVE!</div>
            <div style={{fontSize:20,fontWeight:700,marginTop:8}}>"Your drip is live 🔥"</div>
            <div style={{display:"flex",gap:14,justifyContent:"center",margin:"20px 0"}}>
              {[["+500","DesiCoins"],["10%","Commission"],["🌍","Worldwide"]].map(([n,l])=>
                <div key={l} style={{background:C2,borderRadius:12,padding:"12px 16px",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:800,color:OR}}>{n}</div>
                  <div style={{fontSize:9,color:MT}}>{l}</div>
                </div>
              )}
            </div>
            <button style={btn()} onClick={()=>{setModal(null);toast2("📤 Share your reel!");}}>📤 Share Your Drip</button>
            <button style={{...btn(),marginTop:9,background:"transparent",color:MT,border:"1px solid rgba(255,255,255,0.1)"}} onClick={()=>setModal(null)}>← Back to App</button>
          </div>
        }
      </Modal>

      <Modal open={modal==="voice"} onClose={()=>setModal(null)} title="🎤 Voice Search">
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:MT,marginBottom:12}}>Speak in any Indian language!</div>
          <div onClick={()=>toast2("🎤 Listening!")} style={{width:90,height:90,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 12px",cursor:"pointer"}}>🎤</div>
          <div style={{background:C2,borderRadius:11,padding:13,fontSize:13,marginBottom:14,minHeight:54}}>Say: "Show me sarees under ₹500"</div>
          <button style={btn()} onClick={()=>{setModal(null);toast2("🔍 Searching...");}}>🔍 Search</button>
          <button style={{...btn(),marginTop:8,background:"transparent",color:MT,border:"1px solid rgba(255,255,255,0.1)"}} onClick={()=>setModal(null)}>Close</button>
        </div>
      </Modal>

      <Modal open={modal==="chat"} onClose={()=>setModal(null)} title="💬 Chat with Seller">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:14}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:OR,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700}}>R</div>
          <div>
            <div style={{fontSize:13,fontWeight:700}}>@riya_boutique</div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:GN}}/>
              <div style={{fontSize:10,color:GN}}>Online</div>
            </div>
          </div>
          <div style={{marginLeft:"auto",fontSize:10,color:MT}}>🔒 Safe Chat</div>
        </div>
        <div style={{background:"rgba(255,107,0,0.06)",borderRadius:9,padding:"8px 10px",marginBottom:12,fontSize:10,color:MT,border:"1px solid rgba(255,107,0,0.12)"}}>🛡️ Safety: Never share personal details outside DesiDrip.</div>
        <div style={{display:"flex",flexDirection:"column",gap:10,maxHeight:220,overflowY:"auto",marginBottom:12}}>
          {chatHistory.map((m,i)=>
            <div key={i} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",display:"flex",flexDirection:"column"}}>
              <div style={{maxWidth:"75%",padding:"9px 12px",borderRadius:m.from==="me"?"14px 14px 3px 14px":"14px 14px 14px 3px",fontSize:12,lineHeight:1.5,background:m.from==="me"?`linear-gradient(135deg,${OR},${PK})`:C2,color:m.from==="me"?"white":TX}}>{m.msg}</div>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input style={{flex:1,background:C2,border:"1px solid rgba(255,255,255,0.07)",borderRadius:22,padding:"10px 14px",color:TX,fontSize:13,outline:"none"}} placeholder="Type message..." value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")sendChat();}}/>
          <button onClick={sendChat} style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,border:"none",color:"white",fontSize:18,cursor:"pointer"}}>➤</button>
        </div>
      </Modal>

      <Modal open={modal==="b2b"} onClose={()=>setModal(null)} title="🏢 B2B / Bulk Order Contact">
        <div style={{background:"linear-gradient(135deg,rgba(41,121,255,0.08),rgba(124,77,255,0.08))",borderRadius:11,padding:12,border:"1px solid rgba(41,121,255,0.18)",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>🌍 Direct Contact — No Middleman!</div>
          <div style={{fontSize:10,color:MT}}>Bulk discount up to 40%! Export support available.</div>
        </div>
        <input style={{...inp,marginBottom:9}} placeholder="🏢 Company Name *" value={b2bForm.company} onChange={e=>setB2bForm({...b2bForm,company:e.target.value})}/>
        <input style={{...inp,marginBottom:9}} placeholder="👤 Your Name *" value={b2bForm.name} onChange={e=>setB2bForm({...b2bForm,name:e.target.value})}/>
        <input style={{...inp,marginBottom:9}} placeholder="📱 Phone / WhatsApp *" value={b2bForm.phone} onChange={e=>setB2bForm({...b2bForm,phone:e.target.value})}/>
        <input style={{...inp,marginBottom:9}} placeholder="📧 Business Email"/>
        <select style={{...inp,marginBottom:12}} value={b2bForm.type} onChange={e=>setB2bForm({...b2bForm,type:e.target.value})}>
          <option value="">🎯 Order Type *</option>
          {["Bulk Order (50+ units)","Partnership / Reseller","Export / International","Custom Manufacturing","Corporate Gifting"].map(o=><option key={o}>{o}</option>)}
        </select>
        <button style={btn({background:"linear-gradient(135deg,#2563EB,#7C3AED)"})} onClick={doB2B}>🚀 Send B2B Request</button>
        <button style={{...btn(),marginTop:8,background:"transparent",color:MT,border:"1px solid rgba(255,255,255,0.1)"}} onClick={()=>setModal(null)}>Cancel</button>
      </Modal>
    </div>
    <Toast {...toast}/>
  </>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DesiDrip/>);
</script>
</body>
</html>
