// ── Components ──────────────────────────────────────────
function Toast({msg,type}){
  if(!msg)return null;
  return <div style={{position:"fixed",bottom:90,left:"50%",transform:"translateX(-50%)",background:type==="er"?"#DC2626":type==="info"?"#2563EB":"#059669",color:"white",padding:"10px 20px",borderRadius:22,fontSize:13,fontWeight:700,zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 4px 20px rgba(0,0,0,0.3)"}}>{msg}</div>;
}

function Modal({open,onClose,title,children,fullH=false}){
  if(!open)return null;
  return <div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:300,display:"flex",alignItems:"flex-end"}}>
    <div style={{background:C1,borderRadius:"22px 22px 0 0",width:"100%",padding:"16px 16px 36px",maxHeight:fullH?"95vh":"92vh",overflowY:"auto"}}>
      <div style={{width:36,height:4,background:"rgba(255,255,255,0.12)",borderRadius:2,margin:"0 auto 14px"}}/>
      {title&&<div style={{fontSize:16,fontWeight:700,marginBottom:14}}>{title}</div>}
      {children}
    </div>
  </div>;
}

function BackBtn({onBack,title}){
  return <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",background:"rgba(7,7,10,0.97)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.04)",flexShrink:0}}>
    <button onClick={onBack} style={{background:"rgba(255,255,255,0.08)",border:"none",color:TX,width:34,height:34,borderRadius:10,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>

          } else setScr("role");
          return 100;
        }
        return p+4;
      });
    },50);
    return()=>clearInterval(iv);
  },[]);

  // Flash timer
  useEffect(()=>{
    const iv=setInterval(()=>setFlash(t=>Math.max(0,t-1)),1000);
    return()=>clearInterval(iv);
  },[]);

  // AI suggestion rotate
  useEffect(()=>{
    const iv=setInterval(()=>setAiSugIdx(i=>(i+1)%AI_SUGGESTIONS.length),4000);

  const loginUser=(u)=>{
    setUser(u);DB.setUser(u);setCoins(u.coins||500);

  };

  const sendChat=()=>{
    if(!chatMsg.trim())return;
    setChatHistory(prev=>[...prev,{from:"me",msg:chatMsg}]);
    setChatMsg("");
    setTimeout(()=>{
      const r=["Thank you for your interest! 🙏","Sure, custom orders available 😊","Minimum 5 pieces for wholesale","We ship worldwide in 7-10 days 🌍","Send your measurements for custom fit 📏"];
      setChatHistory(prev=>[...prev,{from:"seller",msg:r[Math.floor(Math.random()*r.length)]}]);

                    <div style={{fontSize:9,color:MT}}>{p.category}</div>
                  </div>
                  <span style={{background:"rgba(0,230,118,0.15)",color:GN,padding:"3px 8px",borderRadius:6,fontSize:9,fontWeight:700}}>LIVE ✅</span>
                </div>
              )
            }
          </div>
        </div>}

        {/* ── TRACK TAB ─────────────────────────────── */}
        {tab==="track"&&<div style={{padding:"14px 12px 80px"}}>
          <BackBtn onBack={()=>setTab("profile")} title="📦 My Orders"/>
          <div style={{height:8}}/>
          {orders.length===0
            ?<div style={{textAlign:"center",color:MT,padding:36,fontSize:13}}>No orders yet!<br/>Shop from Reels 🎬</div>
            :orders.map((o,i)=>
              <div key={i} style={{background:C2,borderRadius:14,padding:14,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
                  <span style={{fontSize:12,fontWeight:700}}>#{(o.orderId||"").slice(-8)}</span>
                  <span style={{background:"rgba(0,230,118,0.15)",color:GN,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:10}}>Placed ✅</span>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                  <span style={{fontSize:32}}>{o.emoji}</span>
                  <div><div style={{fontSize:14,fontWeight:600}}>{o.product}</div><div style={{fontSize:12,color:GN,fontWeight:700}}>₹{o.price}</div></div>
                </div>
                <div style={{fontSize:11,color:MT,marginBottom:8}}>📍 {o.address}</div>
                <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:"35%",background:`linear-gradient(90deg,${OR},${PK})`,borderRadius:2}}/>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
                  <span style={{fontSize:9,color:OR}}>✅ Packed</span>
                  <span style={{fontSize:9,color:MT}}>Shipped</span>
                  <span style={{fontSize:9,color:MT}}>Delivered</span>
                </div>
              </div>
            )
          }
        </div>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{flexShrink:0,display:"flex",justifyContent:"space-around",padding:"9px 0 16px",background:"rgba(7,7,10,0.98)",backdropFilter:"blur(20px)",borderTop:"1px solid rgba(255,255,255,0.04)"}}>
        {[["🏠","Home","home"],["🎬","Reels","reels"],["➕","Upload","upload"],["🪙","Rewards","rewards"],["👤","Profile","profile"]].map(([ic,lb,t])=>
          <div key={t} onClick={()=>{ if(t==="upload"){setModal("upload");setUpStep(0);setUpPct(0);}else setTab(t); }} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
            <span style={{fontSize:20}}>{ic}</span>
            <span style={{fontSize:9,color:tab===t?OR:MT,fontWeight:600}}>{lb}</span>
            {tab===t&&<div style={{width:4,height:4,background:OR,borderRadius:"50%",marginTop:1}}/>}
          </div>
        )}
      </div>
      <button onClick={()=>{setModal("upload");setUpStep(0);setUpPct(0);}} style={{position:"fixed",bottom:74,right:14,width:50,height:50,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,border:"none",fontSize:20,cursor:"pointer",boxShadow:"0 4px 18px rgba(255,107,0,0.6)",zIndex:40}}>🎬</button>

      {/* ── MODALS ──────────────────────────────────── */}

      {/* ORDER */}
      <Modal open={modal==="order"&&!!selProd} onClose={()=>setModal(null)} title="🛒 Order Now">
        {selProd&&<div>
          <div style={{display:"flex",alignItems:"center",gap:11,background:C2,borderRadius:11,padding:11,marginBottom:16}}>
            <span style={{fontSize:44}}>{selProd.emoji}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700}}>{selProd.name}</div>
              <div style={{fontSize:17,fontWeight:800,color:GN}}>₹{selProd.price}</div>
              <div style={{fontSize:10,color:MT,textDecoration:"line-through"}}>₹{selProd.old}</div>
            </div>
            <button onClick={()=>t2("🔮 AR Try-On activated!")} style={{background:"rgba(255,107,0,0.12)",border:"1px solid rgba(255,107,0,0.3)",color:OR,padding:"6px 10px",borderRadius:8,fontSize:10,fontWeight:700,cursor:"pointer"}}>🔮 AR Try</button>
          </div>
          <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Delivery Address</div>
          <input style={{...S.inp,marginBottom:8}} placeholder="📍 House/Flat No, Street" value={orderF.addr1} onChange={e=>setOrderF({...orderF,addr1:e.target.value})}/>
          <input style={{...S.inp,marginBottom:14}} placeholder="🏙️ City, State, PIN" value={orderF.addr2} onChange={e=>setOrderF({...orderF,addr2:e.target.value})}/>
          <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7,textTransform:"uppercase",letterSpacing:1}}>Payment</div>
          <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:14}}>
            {[["💳","UPI / GPay / PhonePe","Instant & Secure"],["🏦","Net Banking / Card","All banks"],["💵","Cash on Delivery","Pay when delivered"],["🌍","International Card","For NRI & Global"]].map(([ic,nm,sb])=>
              <div key={nm} style={{display:"flex",alignItems:"center",gap:10,background:C2,borderRadius:10,padding:11,border:"1.5px solid rgba(255,255,255,0.05)",cursor:"pointer"}}>
                <span style={{fontSize:20}}>{ic}</span>
                <div><div style={{fontSize:12,fontWeight:600}}>{nm}</div><div style={{fontSize:9,color:MT}}>{sb}</div></div>
              </div>
            )}
          </div>
          <button style={S.btn()} onClick={doOrder}>✅ Place Order — ₹{selProd.price}</button>
          <div style={{textAlign:"center",fontSize:10,color:MT,marginTop:9}}>🔒 Secure • LocalStorage Protected</div>
        </div>}
      </Modal>

      {/* WALLET */}
      <Modal open={modal==="wallet"} onClose={()=>setModal(null)} title="🪙 DesiCoins Wallet">
        <div style={{background:"linear-gradient(135deg,rgba(255,107,0,0.12),rgba(255,60,172,0.12))",borderRadius:13,padding:16,textAlign:"center",border:"1px solid rgba(255,107,0,0.18)",marginBottom:14}}>
          <div style={{fontSize:42,fontWeight:800,background:"linear-gradient(135deg,#D97706,#cc7000)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>🪙 {coins}</div>
          <div style={{fontSize:11,color:MT}}>DesiCoins Balance</div>
          <div style={{fontSize:10,color:MT,marginTop:2}}>No cash-out • Use for discounts & boosts</div>
        </div>
        <div style={{display:"flex",gap:7,marginBottom:14}}>
          {[["💸",`linear-gradient(135deg,${OR},${PK})`],["🚀","linear-gradient(135deg,#2563EB,#7C3AED)"],["❤️","linear-gradient(135deg,#059669,#00BCD4)"]].map(([ic,bg])=>
            <button key={ic} onClick={()=>t2(ic+" Applied!")} style={{flex:1,padding:10,borderRadius:10,border:"none",background:bg,color:"white",fontSize:18,cursor:"pointer"}}>{ic}</button>
          )}
        </div>
        {[["🎬","Reel Uploaded","Today","+500","#00E676"],["🛍️","Order Placed","Yesterday","+100","#00E676"],["💸","Discount Used","Last week","-200","#FF1744"]].map(([ic,nm,dt,am,col])=>
          <div key={nm} style={{display:"flex",alignItems:"center",gap:9,background:C2,borderRadius:9,padding:10,marginBottom:6}}>
            <span style={{fontSize:20}}>{ic}</span>
            <div style={{flex:1}}><div style={{fontSize:11,fontWeight:600}}>{nm}</div><div style={{fontSize:9,color:MT}}>{dt}</div></div>
            <span style={{fontSize:12,fontWeight:700,color:col}}>{am}</span>
          </div>
        )}
        <button style={S.btnSec({marginTop:10})} onClick={()=>setModal(null)}>Close</button>
      </Modal>

      {/* NOTIFICATIONS */}
      <Modal open={modal==="notifs"} onClose={()=>setModal(null)} title="🔔 Notifications">
        <div style={{display:"flex",flexDirection:"column",gap:7}}>
          {notifs.map((n,i)=>
            <div key={n.id} onClick={()=>setNotifs(prev=>prev.map((x,j)=>j===i?{...x,read:true}:x))} style={{display:"flex",alignItems:"flex-start",gap:11,padding:12,background:n.read?"rgba(255,255,255,0.02)":"rgba(255,107,0,0.08)",borderRadius:12,border:n.read?"1px solid rgba(255,255,255,0.04)":"1px solid rgba(255,107,0,0.2)",cursor:"pointer"}}>
              <span style={{fontSize:24,flexShrink:0}}>{n.ic}</span>
              <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,marginBottom:2}}>{n.title}</div><div style={{fontSize:11,color:MT,lineHeight:1.4}}>{n.body}</div><div style={{fontSize:9,color:MT,marginTop:4}}>{n.time}</div></div>
              {!n.read&&<div style={{width:8,height:8,borderRadius:"50%",background:OR,flexShrink:0,marginTop:4}}/>}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <button onClick={()=>{setNotifs(prev=>prev.map(n=>({...n,read:true})));t2("✅ All read!");}} style={{flex:1,padding:10,borderRadius:10,border:"none",background:"rgba(255,107,0,0.15)",color:OR,fontSize:12,fontWeight:700,cursor:"pointer"}}>✅ Mark All Read</button>
          <button onClick={()=>setModal(null)} style={{flex:1,padding:10,borderRadius:10,border:"none",background:C2,color:TX,fontSize:12,fontWeight:700,cursor:"pointer"}}>Close</button>
        </div>
      </Modal>

      {/* UPLOAD */}
      <Modal open={modal==="upload"} onClose={()=>setModal(null)} title="🎬 Upload Reel & Earn">
        {upStep===0
          ?<div>
            <div onClick={()=>t2("📱 Camera opening...")} style={{border:"2px dashed rgba(255,107,0,0.35)",borderRadius:14,padding:28,textAlign:"center",cursor:"pointer",background:"rgba(255,107,0,0.04)",marginBottom:12}}>
              <div style={{fontSize:44,marginBottom:8}}>🎬</div>
              <div style={{fontSize:13,color:MT}}>Tap to record or upload</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:4}}>Max 3 min • MP4/MOV</div>
            </div>
            <input style={{...S.inp,marginBottom:9}} placeholder="✍️ Caption... #hashtags"/>
            <input style={{...S.inp,marginBottom:9}} placeholder="🏷️ Tag product"/>
            <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7}}>Video Filters</div>
            <div style={{display:"flex",gap:8,overflowX:"auto",marginBottom:12}}>
              {[["🎨","Original",C2],["🌅","Warm","linear-gradient(135deg,#ff9a00,#ff6200)"],["💜","Cool","linear-gradient(135deg,#667eea,#764ba2)"],["🌿","Fresh","linear-gradient(135deg,#11998e,#38ef7d)"],["✨","Golden","linear-gradient(135deg,#f7971e,#ffd200)"]].map(([ic,nm,bg])=>
                <div key={nm} onClick={()=>t2("✨ "+nm+" applied!")} style={{flexShrink:0,width:56,height:56,borderRadius:10,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",border:"2px solid rgba(255,255,255,0.07)",background:bg}}>
                  <span style={{fontSize:18}}>{ic}</span>
                  <span style={{fontSize:8,color:"rgba(255,255,255,0.6)",marginTop:2}}>{nm}</span>
                </div>
              )}
            </div>
            <div style={{fontSize:10,fontWeight:700,color:MT,marginBottom:7}}>Add Music 🎵</div>
            <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:12}}>
              {["🎵 Trending","🥁 Bollywood","🎸 Folk","🎹 Classical","🎤 Hip-Hop"].map(m=>
                <div key={m} onClick={()=>t2("🎵 "+m+" added!")} style={{flexShrink:0,background:C2,borderRadius:9,padding:"7px 11px",fontSize:11,cursor:"pointer",whiteSpace:"nowrap",border:"1.5px solid rgba(255,255,255,0.05)"}}>{m}</div>
              )}
            </div>
            {upPct>0&&upPct<100&&<div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:MT,marginBottom:6}}>🤖 AI Processing... {upPct}%</div>
              <div style={{height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden"}}>
                <div style={{height:"100%",width:upPct+"%",background:`linear-gradient(90deg,${OR},${PK})`,borderRadius:2,transition:"width 0.1s"}}/>
              </div>
            </div>}
            <button style={S.btn()} onClick={doUpload}>🚀 Upload & Earn 500 DesiCoins!</button>
          </div>
          :<div style={{textAlign:"center",padding:"20px 0"}}>
            <div style={{width:90,height:90,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:44,margin:"0 auto 16px"}}>🔥</div>
            <div style={{fontSize:34,fontWeight:900,letterSpacing:3,background:`linear-gradient(135deg,${OR},${PK},${GD})`,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>DRIP IS LIVE!</div>
            <div style={{fontSize:18,fontWeight:700,marginTop:8}}>"Your drip is live 🔥"</div>
            <div style={{display:"flex",gap:12,justifyContent:"center",margin:"18px 0"}}>
              {[["+500","DesiCoins"],["10%","Commission"],["🌍","Worldwide"]].map(([n,l])=>
                <div key={l} style={{background:C2,borderRadius:12,padding:"12px 14px",textAlign:"center"}}>
                  <div style={{fontSize:18,fontWeight:800,color:OR}}>{n}</div>
                  <div style={{fontSize:9,color:MT}}>{l}</div>
                </div>
              )}
            </div>
            <button style={S.btn()} onClick={()=>{setModal(null);if(navigator.share)navigator.share({title:"Check my DesiDrip reel!",url:"https://jnanesh8867.github.io/Desidrip"});else t2("📤 Share your reel!");}}>📤 Share Your Drip</button>
            <button style={S.btnSec({marginTop:9})} onClick={()=>setModal(null)}>← Back to App</button>
          </div>
        }
      </Modal>

      {/* VOICE */}
      <Modal open={modal==="voice"} onClose={()=>setModal(null)} title="🎤 Voice Search">
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:11,color:MT,marginBottom:12}}>Speak in any Indian language!</div>
          <div onClick={()=>t2("🎤 Listening!")} style={{width:90,height:90,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 12px",cursor:"pointer"}}>🎤</div>
          <div style={{background:C2,borderRadius:11,padding:13,fontSize:13,marginBottom:14,minHeight:50}}>Say: "Show me sarees under ₹500"</div>
          <button style={S.btn()} onClick={()=>{setModal(null);t2("🔍 Searching...");}}>🔍 Search</button>
          <button style={S.btnSec({marginTop:8})} onClick={()=>setModal(null)}>Close</button>
        </div>
      </Modal>

      {/* CHAT */}
      <Modal open={modal==="chat"} onClose={()=>setModal(null)} title="💬 Chat with Seller">
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:OR,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700}}>R</div>
          <div><div style={{fontSize:13,fontWeight:700}}>@riya_boutique</div><div style={{fontSize:10,color:GN}}>● Online</div></div>
          <div style={{marginLeft:"auto",fontSize:10,color:MT}}>🔒 Safe Chat</div>
        </div>
        <div style={{background:"rgba(255,107,0,0.06)",borderRadius:9,padding:"8px 10px",marginBottom:12,fontSize:10,color:MT}}>🛡️ Never share personal details outside DesiDrip.</div>
        <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:220,overflowY:"auto",marginBottom:12}}>
          {chatHistory.map((m,i)=><div key={i} style={{alignSelf:m.from==="me"?"flex-end":"flex-start",maxWidth:"76%",padding:"9px 12px",borderRadius:m.from==="me"?"14px 14px 3px 14px":"14px 14px 14px 3px",fontSize:12,lineHeight:1.5,background:m.from==="me"?`linear-gradient(135deg,${OR},${PK})`:"rgba(255,255,255,0.07)",color:TX}}>{m.msg}</div>)}
        </div>
        <div style={{display:"flex",gap:8}}>
          <input style={{...S.inp,flex:1,borderRadius:22,padding:"10px 14px"}} placeholder="Type message..." value={chatMsg} onChange={e=>setChatMsg(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendChat()}/>
          <button onClick={sendChat} style={{width:44,height:44,borderRadius:"50%",background:`linear-gradient(135deg,${OR},${PK})`,border:"none",color:"white",fontSize:18,cursor:"pointer"}}>➤</button>
        </div>
      </Modal>

      {/* B2B */}
      <Modal open={modal==="b2b"} onClose={()=>setModal(null)} title="🏢 B2B / Bulk Order Contact">
        <div style={{background:"linear-gradient(135deg,rgba(41,121,255,0.08),rgba(124,77,255,0.08))",borderRadius:11,padding:12,border:"1px solid rgba(41,121,255,0.18)",marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:3}}>🌍 Direct Contact — No Middleman!</div>
          <div style={{fontSize:10,color:MT}}>Bulk discount up to 40%! Export support available.</div>
        </div>
        {["🏢 Company Name *","👤 Your Name *","📱 Phone / WhatsApp *","📧 Business Email"].map(ph=><input key={ph} style={{...S.inp,marginBottom:9}} placeholder={ph}/>)}
        <select style={{...S.inp,marginBottom:12}}>
          <option value="">🎯 Order Type *</option>
          {["Bulk Order (50+ units)","Partnership / Reseller","Export / International","Custom Manufacturing","Corporate Gifting"].map(o=><option key={o}>{o}</option>)}
        </select>
        <button style={S.btn({background:"linear-gradient(135deg,#2563EB,#7C3AED)"})} onClick={()=>{setModal(null);t2("✅ B2B Request Sent! We'll contact you within 24hrs!");}}>🚀 Send B2B Request</button>
        <button style={S.btnSec({marginTop:8})} onClick={()=>setModal(null)}>Cancel</button>
      </Modal>
    </div>
    <Toast {...toast}/>
  </>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<DesiDrip/>);
</script>
</body>
</html>
